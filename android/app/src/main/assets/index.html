<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>CryptoPulse</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#0a0e27;color:#e0e6f0}
#loading{position:fixed;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:16px;color:#8890b0;z-index:9999;background:#0a0e27}
#app{display:none}
.header{background:linear-gradient(135deg,#1a1f3a,#0f1330);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2f4a}
.header h1{font-size:18px;font-weight:700;background:linear-gradient(90deg,#00d4aa,#4da8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.status{font-size:11px;padding:4px 8px;border-radius:10px;background:rgba(0,212,170,.15);color:#00d4aa}
.tabs{display:flex;border-bottom:1px solid #2a2f4a;background:#0f1330}
.tab{flex:1;text-align:center;padding:10px;font-size:13px;color:#8890b0;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#00d4aa;border-bottom-color:#00d4aa}
.panel{display:none;padding:12px}
.panel.active{display:block}
.symbol-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.symbol-btn{padding:6px 14px;border-radius:16px;font-size:12px;border:1px solid #2a2f4a;background:#141830;color:#8890b0;cursor:pointer}
.symbol-btn.active{background:rgba(0,212,170,.15);border-color:#00d4aa;color:#00d4aa}
.price-bar{display:flex;align-items:baseline;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.price{font-size:32px;font-weight:700}
.price.up{color:#00d4aa}.price.down{color:#ff4757}
.change{font-size:14px;padding:3px 8px;border-radius:6px}
.change.up{background:rgba(0,212,170,.15);color:#00d4aa}
.change.down{background:rgba(255,71,87,.15);color:#ff4757}
.chart-container{position:relative;height:300px;background:#0f1330;border-radius:12px;border:1px solid #2a2f4a;overflow:hidden;margin-bottom:12px}
.chart-container canvas{width:100%;height:100%}
.indicators{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.ind-btn{padding:4px 10px;border-radius:10px;font-size:11px;border:1px solid #2a2f4a;background:#141830;color:#8890b0;cursor:pointer}
.ind-btn.active{background:rgba(77,168,255,.15);border-color:#4da8ff;color:#4da8ff}
.signal-card{background:linear-gradient(135deg,#141830,#1a1f3a);border:1px solid #2a2f4a;border-radius:12px;padding:14px;margin-bottom:10px}
.signal-card.buy{border-color:rgba(0,212,170,.4)}
.signal-card.sell{border-color:rgba(255,71,87,.4)}
.signal-card h3{font-size:14px;margin-bottom:6px}
.signal-card .reason{font-size:12px;color:#8890b0;line-height:1.6}
.pos-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#141830;border-radius:8px;margin-bottom:6px}
.pos-item .pnl{font-weight:600}
.pos-item .pnl.profit{color:#00d4aa}
.pos-item .pnl.loss{color:#ff4757}
.input-group{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
input,select{flex:1;min-width:80px;padding:10px 12px;border-radius:8px;border:1px solid #2a2f4a;background:#141830;color:#e0e6f0;font-size:13px;outline:none}
input:focus,select:focus{border-color:#4da8ff}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none}
.btn-primary{background:linear-gradient(135deg,#00d4aa,#00b894);color:#000}
.btn-danger{background:linear-gradient(135deg,#ff4757,#ee5a24);color:#fff}
.btn-secondary{background:#2a2f4a;color:#e0e6f0}
.chat-msg{margin-bottom:10px;padding:10px;border-radius:8px;font-size:12px;line-height:1.6}
.chat-msg.ai{background:#0f1330;border:1px solid #2a2f4a}
.chat-msg.user{background:#1a1f3a;margin-left:20px}
.chat-history{max-height:260px;overflow-y:auto;margin-bottom:12px}
.timeframe-row{display:flex;gap:4px;margin-bottom:8px}
.tf-btn{padding:3px 10px;border-radius:8px;font-size:11px;background:#141830;border:1px solid #2a2f4a;color:#8890b0;cursor:pointer}
.tf-btn.active{background:rgba(77,168,255,.15);border-color:#4da8ff;color:#4da8ff}
.hint{font-size:11px;color:#667;text-align:center;padding:20px}
mark{color:#00d4aa;background:none;font-weight:600}
.loss-mark{color:#ff4757;background:none;font-weight:600}
</style>
</head>
<body>
<div id="loading">CryptoPulse 加载中...</div>
<div id="app">
<div class="header"><h1>₿ CryptoPulse</h1><span class="status" id="status">连接中...</span></div>
<div class="tabs">
<div class="tab active" data-tab="chart">📊 行情</div>
<div class="tab" data-tab="ai">🤖 AI</div>
<div class="tab" data-tab="position">💼 仓位</div>
</div>
<div class="panel active" id="panel-chart">
<div class="symbol-row">
<button class="symbol-btn active" data-sym="BTCUSDT">BTC/USDT</button>
<button class="symbol-btn" data-sym="ETHUSDT">ETH/USDT</button>
<button class="symbol-btn" data-sym="SOLUSDT">SOL/USDT</button>
<button class="symbol-btn" data-sym="BNBUSDT">BNB/USDT</button>
</div>
<div class="price-bar"><span class="price" id="price">--</span><span class="change" id="change">--</span></div>
<div class="timeframe-row">
<button class="tf-btn active" data-tf="15m">15分</button>
<button class="tf-btn" data-tf="1h">1小时</button>
<button class="tf-btn" data-tf="4h">4小时</button>
<button class="tf-btn" data-tf="1d">日线</button>
</div>
<div class="indicators">
<button class="ind-btn active" data-ind="ma">MA</button>
<button class="ind-btn" data-ind="boll">布林</button>
<button class="ind-btn" data-ind="macd">MACD</button>
<button class="ind-btn" data-ind="rsi">RSI</button>
</div>
<div class="chart-container"><canvas id="chart"></canvas></div>
<div id="signals"></div>
</div>
<div class="panel" id="panel-ai">
<div class="chat-history" id="chatHistory"><div class="chat-msg ai">👋 我是 CryptoPulse AI。点下方按钮分析行情。</div></div>
<div class="input-group"><button class="btn btn-primary" onclick="quickAnalysis()" style="flex:1">⚡ 快速分析</button></div>
<div class="input-group" style="margin-top:8px">
<input type="text" id="aiInput" placeholder="输入问题..."><button class="btn btn-primary" onclick="askAI()">发送</button>
</div>
</div>
<div class="panel" id="panel-position">
<h3 style="font-size:14px;margin-bottom:12px;color:#8890b0">📋 持仓</h3>
<div id="positionList"><div class="hint">暂无持仓</div></div>
<div style="margin-top:16px;border-top:1px solid #2a2f4a;padding-top:12px">
<h3 style="font-size:14px;margin-bottom:10px;color:#8890b0">➕ 新建</h3>
<div class="input-group">
<select id="posSymbol"><option>BTCUSDT</option><option>ETHUSDT</option><option>SOLUSDT</option><option>BNBUSDT</option></select>
<select id="posSide"><option value="long">做多</option><option value="short">做空</option></select>
</div>
<div class="input-group">
<input type="number" id="posEntry" placeholder="入场价" step="any">
<input type="number" id="posQty" placeholder="数量" step="any">
</div>
<div class="input-group">
<input type="number" id="posSL" placeholder="止损价" step="any">
<input type="number" id="posTP" placeholder="止盈价" step="any">
</div>
<button class="btn btn-primary" onclick="addPosition()" style="width:100%">确认开仓</button>
</div>
</div>
</div>

<script>
// 全局错误捕获
window.onerror = function(msg, url, line) {
  document.getElementById('loading').textContent = '错误: '+msg+' (行'+line+')';
};

try {

var currentSymbol='BTCUSDT',currentTF='15m',klineData=[],activeIndicators=new Set(['ma']);
var positions=[],chatHistory=[],isNative=false;
try{isNative=typeof NativeAPI!=='undefined';}catch(e){}

// 隐藏loading，显示app
setTimeout(function(){
  document.getElementById('loading').style.display='none';
  document.getElementById('app').style.display='block';
}, 500);

function apiFetch(url){
  if(isNative){
    try {
      var data = JSON.parse(NativeAPI.rawFetch(url));
      return Promise.resolve(data);
    } catch(e) {
      return Promise.reject(e);
    }
  }
  return fetch(url).then(function(r){return r.json();});
}

function fetchKlines(sym,tf,limit){
  limit=limit||200;
  var map={'15m':'15m','1h':'1h','4h':'4h','1d':'1d'};
  var interval=map[tf]||'15m';
  return apiFetch('https://api.binance.com/api/v3/klines?symbol='+sym+'&interval='+interval+'&limit='+limit)
    .then(function(d){return d.map(function(x){return {time:x[0]/1000,open:+x[1],high:+x[2],low:+x[3],close:+x[4],volume:+x[5]};});})
    .catch(function(){
      var okMap={'15m':'15m','1h':'1H','4h':'4H','1d':'1D'};
      return apiFetch('https://www.okx.com/api/v5/market/candles?instId='+sym.replace('USDT','-USDT')+'&bar='+(okMap[tf]||'15m')+'&limit='+limit)
        .then(function(d){return d.data.map(function(x){return {time:+x[0]/1000,open:+x[1],high:+x[2],low:+x[3],close:+x[4],volume:+x[5]};}).reverse();});
    }).catch(function(){return [];});
}

function fetchTicker(sym){
  return apiFetch('https://api.binance.com/api/v3/ticker/24hr?symbol='+sym)
    .then(function(d){return {price:+d.lastPrice,change:+d.priceChangePercent,high:+d.highPrice,low:+d.lowPrice,volume:+d.volume};})
    .catch(function(){
      return apiFetch('https://www.okx.com/api/v5/market/ticker?instId='+sym.replace('USDT','-USDT'))
        .then(function(d){var x=d.data[0];return {price:+x.last,change:((+x.last-+x.open24h)/+x.open24h*100),high:+x.high24h,low:+x.low24h,volume:+x.vol24h};});
    }).catch(function(){return null;});
}

function drawChart(){
  var canvas=document.getElementById('chart');
  if(!canvas)return;
  var ctx=canvas.getContext('2d');
  var rect=canvas.parentElement.getBoundingClientRect();
  var w=rect.width,h=rect.height;
  var dpr=window.devicePixelRatio||1;
  if(w<10||h<10){w=350;h=300;}
  canvas.width=w*dpr;canvas.height=h*dpr;
  canvas.style.width=w+'px';canvas.style.height=h+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  
  if(klineData.length<2){
    ctx.fillStyle='#8890b0';ctx.font='14px sans-serif';ctx.textAlign='center';
    ctx.fillText('加载行情数据中...',w/2,h/2);
    return;
  }
  
  var data=klineData;
  var margin={top:20,right:60,bottom:30,left:10};
  var cw=w-margin.left-margin.right,ch=h-margin.top-margin.bottom;
  
  var minP=Infinity,maxP=-Infinity;
  data.forEach(function(d){if(d.low<minP)minP=d.low;if(d.high>maxP)maxP=d.high;});
  var range=maxP-minP||1;
  var gap=cw/data.length,candleW=Math.max(2,Math.min(12,gap*0.7));
  
  // grid
  ctx.strokeStyle='#1a2040';ctx.lineWidth=0.5;
  for(var i=0;i<5;i++){var y=margin.top+ch*i/4;ctx.beginPath();ctx.moveTo(margin.left,y);ctx.lineTo(w-margin.right,y);ctx.stroke();}
  
  // MA
  if(activeIndicators.has('ma')){[7,25,99].forEach(function(p,i){
    var color=['#f9ca24','#ff6348','#7bed9f'][i];
    ctx.strokeStyle=color;ctx.lineWidth=1;ctx.beginPath();
    for(var j=p-1;j<data.length;j++){
      var sum=0;for(var k=j-p+1;k<=j;k++)sum+=data[k].close;
      var ma=sum/p,x=margin.left+j*gap+gap/2,y=margin.top+ch-(ma-minP)/range*ch;
      if(j===p-1)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    }ctx.stroke();
  });}
  
  // candles
  data.forEach(function(d,i){
    var x=margin.left+i*gap+gap/2;
    var oy=margin.top+ch-(d.open-minP)/range*ch,cy=margin.top+ch-(d.close-minP)/range*ch;
    var hy=margin.top+ch-(d.high-minP)/range*ch,ly=margin.top+ch-(d.low-minP)/range*ch;
    var green=d.close>=d.open;
    ctx.fillStyle=green?'#00d4aa':'#ff4757';ctx.strokeStyle=green?'#00d4aa':'#ff4757';
    ctx.beginPath();ctx.moveTo(x,hy);ctx.lineTo(x,ly);ctx.stroke();
    ctx.fillRect(x-candleW/2,Math.min(oy,cy),candleW,Math.max(1,Math.abs(cy-oy)));
  });
  
  // RSI
  if(activeIndicators.has('rsi')){
    var rsiH=40,rsiY=h-margin.bottom-rsiH,p=14,rsi=[];
    for(var j=p;j<data.length;j++){
      var gain=0,loss=0;
      for(var k=j-p+1;k<=j;k++){var ch=data[k].close-data[k-1].close;if(ch>0)gain+=ch;else loss-=ch;}
      rsi.push(100-100/(1+gain/(loss||0.0001)));
    }
    ctx.strokeStyle='#e056a0';ctx.beginPath();
    rsi.forEach(function(v,i){var x=margin.left+(i+p)*gap+gap/2,y=rsiY+rsiH-v/100*rsiH;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);});
    ctx.stroke();
    ctx.strokeStyle='#2a2f4a';ctx.setLineDash([3,3]);
    [30,70].forEach(function(lvl){var y=rsiY+rsiH-lvl/100*rsiH;ctx.beginPath();ctx.moveTo(margin.left,y);ctx.lineTo(w-margin.right,y);ctx.stroke();});
    ctx.setLineDash([]);
  }
  
  // price labels
  ctx.fillStyle='#8890b0';ctx.font='10px monospace';ctx.textAlign='right';
  for(var i=0;i<5;i++){var pr=minP+range*(4-i)/4;ctx.fillText(pr.toFixed(pr>1000?0:2),w-margin.right+55,margin.top+ch*i/4+3);}
}

function detectSignals(){
  if(klineData.length<26)return[];
  var s=[],last=klineData[klineData.length-1];
  var ma7=0,ma25=0,prevMa7=0,prevMa25=0;
  for(var i=klineData.length-7;i<klineData.length;i++)ma7+=klineData[i].close;ma7/=7;
  for(var i=klineData.length-25;i<klineData.length;i++)ma25+=klineData[i].close;ma25/=25;
  for(var i=klineData.length-8;i<klineData.length-1;i++)prevMa7+=klineData[i].close;prevMa7/=7;
  for(var i=klineData.length-26;i<klineData.length-1;i++)prevMa25+=klineData[i].close;prevMa25/=25;
  if(prevMa7<=prevMa25&&ma7>ma25)s.push({type:'buy',reason:'📈 金叉：MA7上穿MA25'});
  else if(prevMa7>=prevMa25&&ma7<ma25)s.push({type:'sell',reason:'📉 死叉：MA7下穿MA25'});
  var gain=0,loss=0;
  for(var i=klineData.length-14;i<klineData.length;i++){var ch=klineData[i].close-klineData[i-1].close;if(ch>0)gain+=ch;else loss-=ch;}
  var rsi=100-100/(1+gain/(loss||0.0001));
  if(rsi<30)s.push({type:'buy',reason:'RSI超卖('+rsi.toFixed(1)+')'});
  if(rsi>70)s.push({type:'sell',reason:'RSI超买('+rsi.toFixed(1)+')'});
  return s;
}

function renderSignals(){
  var signals=detectSignals(),c=document.getElementById('signals');
  if(signals.length===0){c.innerHTML='<div class="hint">暂无明确信号</div>';return;}
  c.innerHTML=signals.map(function(s){return '<div class="signal-card '+s.type+'"><h3>'+(s.type==='buy'?'🟢 做多':'🔴 做空')+'</h3><div class="reason">'+s.reason+'</div></div>';}).join('');
}

function updateData(){
  var st=document.getElementById('status');if(st){st.textContent='更新中...';}
  fetchTicker(currentSymbol).then(function(t){
    if(t){
      var prEl=document.getElementById('price');prEl.textContent=t.price.toFixed(t.price>1000?0:2);
      prEl.className='price '+(t.change>=0?'up':'down');
      var chEl=document.getElementById('change');chEl.textContent=(t.change>=0?'+':'')+t.change.toFixed(2)+'%';
      chEl.className='change '+(t.change>=0?'up':'down');
      if(st){st.textContent='● 在线';st.style.color='#00d4aa';}
    }else{if(st){st.textContent='● 离线';st.style.color='#ff4757';}}
  }).catch(function(){if(st){st.textContent='● 离线';st.style.color='#ff4757';}});
  fetchKlines(currentSymbol,currentTF).then(function(d){klineData=d;drawChart();renderSignals();updatePositionPanel();});
}

function quickAnalysis(){
  var history=document.getElementById('chatHistory');
  history.innerHTML+='<div class="chat-msg user">⚡ 快速分析 '+currentSymbol+' '+currentTF+'</div>';
  var last10=klineData.slice(-10).map(function(d){return 'C:'+d.close.toFixed(2);}).join(',');
  history.innerHTML+='<div class="chat-msg ai">📊 最近10根'+currentTF+'K线收盘价：<br>'+last10+'<br><br>信号：'+(detectSignals().map(function(s){return s.reason;}).join('；')||'无')+'<br><br>💡 数据已就绪，可输入具体问题深入分析。</div>';
  history.scrollTop=history.scrollHeight;
}

function askAI(){
  var inp=document.getElementById('aiInput'),q=inp.value.trim();if(!q)return;
  var history=document.getElementById('chatHistory');
  history.innerHTML+='<div class="chat-msg user">'+q+'</div>';
  history.innerHTML+='<div class="chat-msg ai">🤖 DeepSeek API 需配置 Key。请前往设置输入 API Key 后使用。</div>';
  inp.value='';history.scrollTop=history.scrollHeight;
}

function addPosition(){
  var sym=document.getElementById('posSymbol').value,side=document.getElementById('posSide').value;
  var entry=+document.getElementById('posEntry').value,qty=+document.getElementById('posQty').value;
  var sl=+document.getElementById('posSL').value,tp=+document.getElementById('posTP').value;
  if(!entry||!qty)return;
  positions.push({id:Date.now(),symbol:sym,side:side,entry:entry,qty:qty,sl:sl||0,tp:tp||0,time:new Date().toISOString()});
  try{localStorage.setItem('cp_positions',JSON.stringify(positions));}catch(e){}
  updatePositionPanel();
  document.getElementById('posEntry').value='';document.getElementById('posQty').value='';
  document.getElementById('posSL').value='';document.getElementById('posTP').value='';
}

function closePosition(id){positions=positions.filter(function(p){return p.id!==id;});try{localStorage.setItem('cp_positions',JSON.stringify(positions));}catch(e){}updatePositionPanel();}

function updatePositionPanel(){
  var c=document.getElementById('positionList');
  if(positions.length===0){c.innerHTML='<div class="hint">暂无持仓</div>';return;}
  var pr=document.getElementById('price').textContent,cur=pr==='--'?0:+pr;
  c.innerHTML=positions.map(function(p){
    var pnl=0,pnlPct=0;
    if(cur&&p.entry){pnl=p.side==='long'?(cur-p.entry)*p.qty:(p.entry-cur)*p.qty;pnlPct=(cur-p.entry)/p.entry*100*(p.side==='long'?1:-1);}
    return '<div class="pos-item"><div><strong>'+(p.side==='long'?'📈多':'📉空')+' '+p.symbol+'</strong><br><small style="color:#8890b0">入场'+p.entry+'×'+p.qty+'</small></div><div style="text-align:right"><span class="pnl '+(pnl>=0?'profit':'loss')+'">'+pnl.toFixed(2)+' ('+pnlPct.toFixed(2)+'%)</span><br><button class="btn btn-danger" style="padding:2px 8px;font-size:10px;margin-top:4px" onclick="closePosition('+p.id+')">平仓</button></div></div>';
  }).join('');
}

// event bindings
document.querySelectorAll('.tab').forEach(function(t){t.onclick=function(){
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(function(x){x.classList.remove('active');});
  t.classList.add('active');
  var panel=document.getElementById('panel-'+t.dataset.tab);
  if(panel)panel.classList.add('active');
  if(t.dataset.tab==='chart')drawChart();
  if(t.dataset.tab==='position')updatePositionPanel();
};});

document.querySelectorAll('.symbol-btn').forEach(function(b){b.onclick=function(){
  document.querySelectorAll('.symbol-btn').forEach(function(x){x.classList.remove('active');});
  b.classList.add('active');currentSymbol=b.dataset.sym;updateData();
};});

document.querySelectorAll('.tf-btn').forEach(function(b){b.onclick=function(){
  document.querySelectorAll('.tf-btn').forEach(function(x){x.classList.remove('active');});
  b.classList.add('active');currentTF=b.dataset.tf;updateData();
};});

document.querySelectorAll('.ind-btn').forEach(function(b){b.onclick=function(){
  var ind=b.dataset.ind;
  if(activeIndicators.has(ind))activeIndicators.delete(ind);else activeIndicators.add(ind);
  b.classList.toggle('active');drawChart();
};});

document.getElementById('aiInput').addEventListener('keydown',function(e){if(e.key==='Enter')askAI();});

// try load positions
try{positions=JSON.parse(localStorage.getItem('cp_positions')||'[]');}catch(e){positions=[];}

// start
drawChart();
setTimeout(updateData,800);
setInterval(updateData,30000);

}catch(err){
  document.getElementById('loading').textContent='JS错误: '+err.message;
  document.getElementById('loading').style.color='#ff4757';
}
</script>
</body>
</html>
