name: Build Release APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.5'

      - name: Generate Keystore
        working-directory: android/app
        run: |
          keytool -genkeypair -v -keystore cryptopulse.keystore \
            -alias cryptopulse -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass cryptopulse -keypass cryptopulse \
            -dname "CN=CryptoPulse, OU=Dev, O=CryptoPulse, L=Beijing, ST=Beijing, C=CN"

      - name: Build Release APK
        working-directory: android
        run: gradle assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CryptoPulse-Release
          path: android/app/build/outputs/apk/release/app-release.apk
