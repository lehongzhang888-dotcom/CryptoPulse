<!DOCTYPE html>
<html lang="zh-CN">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0a0e27;color:#e0e6f0;overflow-x:hidden;-webkit-tap-highlight-color:transparent}
.header{background:linear-gradient(135deg,#1a1f3a,#0f1330);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #2a2f4a;position:sticky;top:0;z-index:100}
.header h1{font-size:18px;font-weight:700;background:linear-gradient(90deg,#00d4aa,#4da8ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .status{font-size:11px;padding:4px 8px;border-radius:10px;background:rgba(0,212,170,.15);color:#00d4aa}
.tabs{display:flex;gap:0;border-bottom:1px solid #2a2f4a;background:#0f1330}
.tab{flex:1;text-align:center;padding:10px;font-size:13px;color:#8890b0;cursor:pointer;border-bottom:2px solid transparent;transition:.2s}
.tab.active{color:#00d4aa;border-bottom-color:#00d4aa}
.panel{display:none;padding:12px}
.panel.active{display:block}
.symbol-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.symbol-btn{padding:6px 14px;border-radius:16px;font-size:12px;border:1px solid #2a2f4a;background:#141830;color:#8890b0;cursor:pointer;transition:.2s}

.price-bar{display:flex;align-items:baseline;gap:12px;margin-bottom:8px;flex-wrap:wrap}
.price{font-size:32px;font-weight:700}
.price.up{color:#00d4aa}
.price.down{color:#ff4757}
.change{font-size:14px;padding:3px 8px;border-radius:6px}

.change.down{background:rgba(255,71,87,.15);color:#ff4757}

.chart-container canvas{width:100%;height:100%}
.indicators{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}

.ind-btn.active{background:rgba(77,168,255,.15);border-color:#4da8ff;color:#4da8ff}
.signal-card{background:linear-gradient(135deg,#141830,#1a1f3a);border:1px solid #2a2f4a;border-radius:12px;padding:14px;margin-bottom:10px}

.pos-item{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:#141830;border-radius:8px;margin-bottom:6px}

.input-group{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
input,select{flex:1;min-width:80px;padding:10px 12px;border-radius:8px;border:1px solid #2a2f4a;background:#141830;color:#e0e6f0;font-size:13px;outline:none}
input:focus,select:focus{border-color:#4da8ff}
.btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.2s}
.btn-primary{background:linear-gradient(135deg,#00d4aa,#00b894);color:#000}
.btn-danger{background:linear-gradient(135deg,#ff4757,#ee5a24);color:#fff}
.btn-secondary{background:#2a2f4a;color:#e0e6f0}
.btn:active{transform:scale(.96)}
.ai-panel{background:#0f1330;border:1px solid #2a2f4a;border-radius:12px;padding:14px}
.ai-panel .thinking{display:flex;align-items:center;gap:6px;font-size:12px;color:#8890b0;padding:16px 0}
.ai-panel .thinking .dot{width:6px;height:6px;border-radius:50%;background:#4da8ff;animation:pulse 1.2s infinite}
.ai-panel .thinking .dot:nth-child(2){animation-delay:.2s}
.ai-panel .thinking .dot:nth-child(3){animation-delay:.4s}
@keyframes pulse{0%,100%{opacity:.3}50%{opacity:1}}
.ai-response{font-size:13px;line-height:1.7;white-space:pre-wrap}
.mark{font-weight:600;color:#00d4aa}

.chat-history{max-height:300px;overflow-y:auto;margin-bottom:12px}
.chat-msg{margin-bottom:10px;padding:10px;border-radius:8px;font-size:12px;line-height:1.6}
.chat-msg.user{background:#1a1f3a;color:#e0e6f0;margin-left:20px}
.chat-msg.ai{background:#0f1330;border:1px solid #2a2f4a;margin-right:20px}
kbd{background:#2a2f4a;padding:2px 6px;border-radius:4px;font-size:11px}
.alert{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 20px;border-radius:10px;font-size:14px;z-index:999;animation:slideDown .3s ease;display:none}
.alert.show{display:block}
.alert.success{background:#00d4aa;color:#000}
.alert.error{background:#ff4757;color:#fff}
@keyframes slideDown{from{top:-50px;opacity:0}to{top:20px;opacity:1}}
.timeframe-row{display:flex;gap:4px;margin-bottom:8px}
.tf-btn{padding:3px 10px;border-radius:8px;font-size:11px;background:#141830;border:1px solid #2a2f4a;color:#8890b0;cursor:pointer}
.tf-btn.active{background:rgba(77,168,255,.15);border-color:#4da8ff;color:#4da8ff}
.hint{font-size:11px;color:#667;text-align:center;padding:20px}
.loading{text-align:center;padding:40px;color:#8890b0}
</style>

<script>
// ==================== 全局状态 ====================
const API_BASE = 'https://api.binance.com/api/v3';
const OKX_BASE = 'https://www.okx.com/api/v5/market';
let currentSymbol = 'BTCUSDT';
let currentTF = '15m';
let klineData = [];
let activeIndicators = new Set(['ma']);
let positions = JSON.parse(localStorage.getItem('cp_positions')||'[]');
let isNative = typeof NativeAPI !== 'undefined';

// ==================== NativeAPI 桥接 / HTTP fallback ====================
async function apiFetch(url) {
  if (isNative) {
    try { return JSON.parse(await NativeAPI.rawFetch(url)); } catch(e) {}
  }
  // fallback: try direct (works in browser, fails in WebView file://)
  const r = await fetch(url);
  return r.json();
}

async function fetchKlines(sym, tf, limit=200) {
  const intervalMap = {'15m':'15m','1h':'1h','4h':'4h','1d':'1d'};
  const interval = intervalMap[tf]||'15m';
  // try Binance
  try {
    const data = await apiFetch(`${API_BASE}/klines?symbol=${sym}&interval=${interval}&limit=${limit}`);
    return data.map(d=>({
      time: d[0]/1000, open: +d[1], high: +d[2], low: +d[3], close: +d[4], volume: +d[5]
    }));
  } catch(e) {}
  // fallback OKX
  try {
    const okxTf = {'15m':'15m','1h':'1H','4h':'4H','1d':'1D'};
    const bar = okxTf[tf]||'15m';
    const data = await apiFetch(`${OKX_BASE}/candles?instId=${sym.replace('USDT','-USDT')}&bar=${bar}&limit=${limit}`);
    return data.data.map(d=>({
      time: +d[0]/1000, open: +d[1], high: +d[2], low: +d[3], close: +d[4], volume: +d[5]
    })).reverse();
  } catch(e) {}
  return [];
}

async function fetchTicker(sym) {
  try {
    const data = await apiFetch(`${API_BASE}/ticker/24hr?symbol=${sym}`);
    return {price:+data.lastPrice, change:+data.priceChangePercent, high:+data.highPrice, low:+data.lowPrice, volume:+data.volume};
  } catch(e) {}
  try {
    const data = await apiFetch(`${OKX_BASE}/ticker?instId=${sym.replace('USDT','-USDT')}`);
    const d = data.data[0];
    return {price:+d.last, change:((+d.last-+d.open24h)/+d.open24h*100), high:+d.high24h, low:+d.low24h, volume:+d.vol24h};
  } catch(e) {}
  return null;
}

// ==================== 图表渲染 ====================
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');
let chartWidth, chartHeight;

function resizeCanvas() {
  const rect = canvas.parentElement.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  chartWidth = rect.width;
  chartHeight = rect.height;
  canvas.width = chartWidth * dpr;
  canvas.height = chartHeight * dpr;
  canvas.style.width = chartWidth + 'px';
  canvas.style.height = chartHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function drawChart() {
  resizeCanvas();
  if (klineData.length < 2) return;
  ctx.clearRect(0, 0, chartWidth, chartHeight);
  
  const data = klineData;
  const margin = {top:20,right:60,bottom:30,left:10};
  const w = chartWidth - margin.left - margin.right;
  const h = chartHeight - margin.top - margin.bottom;
  
  let minPrice = Infinity, maxPrice = -Infinity;
  data.forEach(d=>{if(d.low<minPrice)minPrice=d.low;if(d.high>maxPrice)maxPrice=d.high});
  const priceRange = maxPrice - minPrice || 1;
  
  const candleW = Math.max(2, Math.min(12, w/data.length*0.7));
  const gap = w/data.length;
  
  // grid
  ctx.strokeStyle='#1a2040';ctx.lineWidth=.5;
  for(let i=0;i<5;i++){
    const y = margin.top + h*i/4;
    ctx.beginPath();ctx.moveTo(margin.left,y);ctx.lineTo(chartWidth-margin.right,y);ctx.stroke();
  }
  
  // MA lines
  if(activeIndicators.has('ma')){
    [7,25,99].forEach((p,i)=>{
      const color = ['#f9ca24','#ff6348','#7bed9f'][i];
      ctx.strokeStyle=color;ctx.lineWidth=1;
      ctx.beginPath();
      for(let j=p-1;j<data.length;j++){
        const sum = data.slice(j-p+1,j+1).reduce((s,d)=>s+d.close,0);
        const ma = sum/p;
        const x = margin.left + j*gap + gap/2;
        const y = margin.top + h - (ma-minPrice)/priceRange*h;
        if(j===p-1)ctx.moveTo(x,y);else ctx.lineTo(x,y);
      }
      ctx.stroke();
    });
  }
  
  // Bollinger Bands
  if(activeIndicators.has('boll')){
    const p=20;
    for(let j=p-1;j<data.length;j++){
      const slice = data.slice(j-p+1,j+1).map(d=>d.close);
      const ma = slice.reduce((a,b)=>a+b)/p;
      const std = Math.sqrt(slice.reduce((s,v)=>s+(v-ma)**2,0)/p);
      const x = margin.left + j*gap + gap/2;
      const yu = margin.top + h - (ma+2*std-minPrice)/priceRange*h;
      const yl = margin.top + h - (ma-2*std-minPrice)/priceRange*h;
      ctx.fillStyle='rgba(77,168,255,.08)';
      ctx.fillRect(x-candleW/2, yu, candleW, yl-yu);
    }
  }
  
  // candlesticks
  data.forEach((d,i)=>{
    const x = margin.left + i*gap + gap/2;
    const openY = margin.top + h - (d.open-minPrice)/priceRange*h;
    const closeY = margin.top + h - (d.close-minPrice)/priceRange*h;
    const highY = margin.top + h - (d.high-minPrice)/priceRange*h;
    const lowY = margin.top + h - (d.low-minPrice)/priceRange*h;
    
    const isGreen = d.close >= d.open;
    ctx.fillStyle = isGreen ? '#00d4aa' : '#ff4757';
    ctx.strokeStyle = isGreen ? '#00d4aa' : '#ff4757';
    
    // wick
    ctx.beginPath();ctx.moveTo(x,highY);ctx.lineTo(x,lowY);ctx.stroke();
    // body
    const bodyH = Math.max(1, Math.abs(closeY-openY));
    const bodyY = Math.min(openY, closeY);
    ctx.fillRect(x-candleW/2, bodyY, candleW, bodyH);
  });
  
  // MACD sub
  if(activeIndicators.has('macd')){
    const macdH = 50, macdY = chartHeight-margin.bottom-macdH;
    const ema12=[],ema26=[],dif=[],dea=[],macd=[];
    data.forEach((d,i)=>{
      const c=d.close;
      ema12.push(i===0?c:ema12[i-1]*11/13+c*2/13);
      ema26.push(i===0?c:ema26[i-1]*25/27+c*2/27);
      dif.push(ema12[i]-ema26[i]);
      dea.push(i===0?dif[0]:dea[i-1]*8/10+dif[i]*2/10);
      macd.push((dif[i]-dea[i])*2);
    });
    const maxMacd = Math.max(...macd.map(Math.abs))||1;
    macd.forEach((v,i)=>{
      const x = margin.left + i*gap + gap/2;
      const barY = macdY + macdH/2;
      const barH = v/maxMacd*macdH/2;
      ctx.fillStyle = v>=0?'#00d4aa':'#ff4757';
      ctx.fillRect(x-1, v>=0?barY-barH:barY, 2, Math.abs(barH));
    });
    ctx.strokeStyle='#f9ca24';ctx.beginPath();
    dif.forEach((v,i)=>{
      const x=margin.left+i*gap+gap/2;
      const y=macdY+macdH/2-v/maxMacd*macdH/2;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });ctx.stroke();
  }
  
  // RSI sub
  if(activeIndicators.has('rsi')){
    const rsiH=40,rsiY=chartHeight-margin.bottom-rsiH;
    const p=14;const rsi=[];
    for(let i=p;i<data.length;i++){
      let gain=0,loss=0;
      for(let j=i-p+1;j<=i;j++){
        const ch=data[j].close-data[j-1].close;
        if(ch>0)gain+=ch;else loss-=ch;
      }
      const rs=(gain/p)/((loss/p)||0.0001);
      rsi.push(100-100/(1+rs));
    }
    ctx.strokeStyle='#e056a0';ctx.beginPath();
    rsi.forEach((v,i)=>{
      const x=margin.left+(i+p)*gap+gap/2;
      const y=rsiY+rsiH-v/100*rsiH;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });ctx.stroke();
    ctx.strokeStyle='#2a2f4a';ctx.setLineDash([3,3]);
    [30,70].forEach(lvl=>{
      const y=rsiY+rsiH-lvl/100*rsiH;
      ctx.beginPath();ctx.moveTo(margin.left,y);ctx.lineTo(chartWidth-margin.right,y);ctx.stroke();
    });
    ctx.setLineDash([]);
  }
  
  // price labels
  ctx.fillStyle='#8890b0';ctx.font='10px monospace';ctx.textAlign='right';
  for(let i=0;i<5;i++){
    const price=minPrice+priceRange*(4-i)/4;
    const y=margin.top+h*i/4;
    ctx.fillText(price.toFixed(price>1000?0:2),chartWidth-margin.right+55,y+3);
  }
}

// ==================== 信号检测 ====================
function detectSignals() {
  if(klineData.length<26) return [];
  const signals=[];
  const last=klineData[klineData.length-1];
  const prev=klineData[klineData.length-2];
  
  // MA crossover
  const ma7=klineData.slice(-7).reduce((s,d)=>s+d.close,0)/7;
  const ma25=klineData.slice(-25).reduce((s,d)=>s+d.close,0)/25;
  const prevMa7=klineData.slice(-8,-1).reduce((s,d)=>s+d.close,0)/7;
  const prevMa25=klineData.slice(-26,-1).reduce((s,d)=>s+d.close,0)/25;
  
  if(prevMa7<=prevMa25 && ma7>ma25){
    signals.push({type:'buy',reason:'📈 <mark>金叉信号</mark>：MA7上穿MA25，短期均线突破中期均线，建议关注做多机会。'});
  }else if(prevMa7>=prevMa25 && ma7<ma25){
    signals.push({type:'sell',reason:'📉 <loss-mark>死叉信号</loss-mark>：MA7下穿MA25，短期趋势转弱，注意风险。'});
  }
  
  // RSI
  const p=14;let gain=0,loss=0;
  for(let i=klineData.length-p;i<klineData.length;i++){
    const ch=klineData[i].close-klineData[i-1].close;
    if(ch>0)gain+=ch;else loss-=ch;
  }
  const rsi=100-100/(1+gain/(loss||0.0001));
  if(rsi<30) signals.push({type:'buy',reason:`📊 <mark>RSI超卖</mark>（${rsi.toFixed(1)}），可能存在反弹机会。`});
  if(rsi>70) signals.push({type:'sell',reason:`📊 <loss-mark>RSI超买</loss-mark>（${rsi.toFixed(1)}），短线回调风险较高。`});
  
  // Volume spike
  const avgVol=klineData.slice(-21,-1).reduce((s,d)=>s+d.volume,0)/20;
  if(last.volume>avgVol*2){
    const dir=last.close>prev.close?'放量上涨':'放量下跌';
    signals.push({type:dir.includes('涨')?'buy':'sell',reason:`📊 <mark>成交量异动</mark>：${dir}（${(last.volume/avgVol).toFixed(1)}倍均量），关注突破方向。`});
  }
  
  return signals;
}

function renderSignals() {
  const signals=detectSignals();
  const container=document.getElementById('signals');
  if(signals.length===0){
    container.innerHTML='<div class="hint">暂无明确交易信号</div>';
    return;
  }
  container.innerHTML=signals.map(s=>`
    <div class="signal-card ${s.type}">
      <h3>${s.type==='buy'?'🟢 做多信号':'🔴 做空信号'}</h3>
      <div class="reason">${s.reason}</div>
    </div>
  `).join('');
}

// ==================== 数据更新 ====================
async function updateData() {
  document.getElementById('status').textContent='更新中...';
  const ticker=await fetchTicker(currentSymbol);
  if(ticker){
    document.getElementById('price').textContent=ticker.price.toFixed(ticker.price>1000?0:2);
    document.getElementById('price').className='price '+(ticker.change>=0?'up':'down');
    document.getElementById('change').textContent=(ticker.change>=0?'+':'')+ticker.change.toFixed(2)+'%';
    document.getElementById('change').className='change '+(ticker.change>=0?'up':'down');
    document.getElementById('status').textContent='● 在线';
    document.getElementById('status').style.color='#00d4aa';
  }else{
    document.getElementById('status').textContent='● 离线';
    document.getElementById('status').style.color='#ff4757';
  }
  
  klineData=await fetchKlines(currentSymbol, currentTF);
  drawChart();
  renderSignals();
  updatePositionPanel();
}

// ==================== AI 分析 ====================
const DEEPSEEK_KEY = localStorage.getItem('cp_ds_key')||'';
const chatHistory = [];

function addChatMsg(role, text) {
  chatHistory.push({role, text});
  const div=document.createElement('div');
  div.className='chat-msg '+role;
  div.textContent=text;
  document.getElementById('chatHistory').appendChild(div);
  document.getElementById('chatHistory').scrollTop=document.getElementById('chatHistory').scrollHeight;
}

async function quickAnalysis() {
  if(!DEEPSEEK_KEY){
    const key=prompt('请输入 DeepSeek API Key（保存到本地，不会上传）：');
    if(!key) return;
    localStorage.setItem('cp_ds_key', key);
    location.reload();
    return;
  }
  
  const last10=klineData.slice(-10).map(d=>`O:${d.open.toFixed(2)} H:${d.high.toFixed(2)} L:${d.low.toFixed(2)} C:${d.close.toFixed(2)}`).join('\n');
  const ticker=document.getElementById('price').textContent;
  const change=document.getElementById('change').textContent;
  const signals=detectSignals().map(s=>s.reason.replace(/<[^>]+>/g,'')).join('\n');
  
  const prompt=`你是加密货币短线交易分析师。当前${currentSymbol}价格${ticker}，24h涨跌${change}，${currentTF}周期。

最近10根K线：
${last10}

技术信号：
${signals||'无明确信号'}

请用中文给出简洁分析（150字内）：
1. 当前趋势判断
2. 关键支撑/阻力位
3. 短线操作建议（做多/做空/观望）
4. 建议止损止盈`;

  addChatMsg('user', `⚡ 快速分析 ${currentSymbol} ${currentTF}`);
  
  const thinkingEl=document.createElement('div');
  thinkingEl.className='thinking';
  thinkingEl.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span> AI分析中...';
  document.getElementById('chatHistory').appendChild(thinkingEl);
  
  try {
    let response;
    if(isNative){
      response = await NativeAPI.aiChat(prompt);
    } else {
      const r = await fetch('https://api.deepseek.com/chat/completions', {
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+DEEPSEEK_KEY},
        body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:500,temperature:.7})
      });
      const d = await r.json();
      response = d.choices[0].message.content;
    }
    thinkingEl.remove();
    addChatMsg('ai', response);
  } catch(e) {
    thinkingEl.remove();
    addChatMsg('ai', '❌ API调用失败：'+e.message+'\n请检查网络或API Key是否正确。');
  }
}

function askAI() {
  const input=document.getElementById('aiInput');
  const q=input.value.trim();
  if(!q) return;
  addChatMsg('user', q);
  input.value='';
  
  if(!DEEPSEEK_KEY){
    addChatMsg('ai','请先在快速分析中输入API Key。');
    return;
  }
  
  const thinkingEl=document.createElement('div');
  thinkingEl.className='thinking';
  thinkingEl.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span> 思考中...';
  document.getElementById('chatHistory').appendChild(thinkingEl);
  
  const ctx=klineData.slice(-20).map(d=>`${new Date(d.time*1000).toLocaleTimeString()} C:${d.close}`).join('\n');
  const prompt=`上下文：${currentSymbol} ${currentTF} 最近20根K线收盘价：\n${ctx}\n\n用户问题：${q}\n\n请简洁回答。`;
  
  fetch('https://api.deepseek.com/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+DEEPSEEK_KEY},
    body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:prompt}],max_tokens:400})
  }).then(r=>r.json()).then(d=>{
    thinkingEl.remove();
    addChatMsg('ai', d.choices[0].message.content);
  }).catch(e=>{
    thinkingEl.remove();
    addChatMsg('ai','❌ '+e.message);
  });
}

// ==================== 仓位管理 ====================
function addPosition() {
  const sym=document.getElementById('posSymbol').value;
  const side=document.getElementById('posSide').value;
  const entry=+document.getElementById('posEntry').value;
  const qty=+document.getElementById('posQty').value;
  const sl=+document.getElementById('posSL').value;
  const tp=+document.getElementById('posTP').value;
  if(!entry||!qty){showAlert('请填写入场价和数量','error');return;}
  
  positions.push({id:Date.now(),symbol:sym,side,entry,qty,sl:sl||0,tp:tp||0,time:new Date().toISOString()});
  localStorage.setItem('cp_positions',JSON.stringify(positions));
  updatePositionPanel();
  showAlert('✅ 持仓已添加','success');
  document.getElementById('posEntry').value='';
  document.getElementById('posQty').value='';
  document.getElementById('posSL').value='';
  document.getElementById('posTP').value='';
}

function closePosition(id) {
  positions=positions.filter(p=>p.id!==id);
  localStorage.setItem('cp_positions',JSON.stringify(positions));
  updatePositionPanel();
  showAlert('已平仓','success');
}

function updatePositionPanel() {
  const container=document.getElementById('positionList');
  if(positions.length===0){
    container.innerHTML='<div class="hint">暂无持仓记录</div>';
    return;
  }
  const ticker=document.getElementById('price').textContent;
  const curPrice=ticker==='--'?0:+ticker;
  
  container.innerHTML=positions.map(p=>{
    let pnl=0,pnlPct=0;
    if(curPrice&&p.entry){
      pnl=p.side==='long'?(curPrice-p.entry)*p.qty:(p.entry-curPrice)*p.qty;
      pnlPct=(curPrice-p.entry)/p.entry*100*(p.side==='long'?1:-1);
    }
    const pnlClass=pnl>=0?'profit':'loss';
    const tpInfo=p.tp?` | TP:${p.tp}`:'';
    const slInfo=p.sl?` | SL:${p.sl}`:'';
    return `<div class="pos-item">
      <div>
        <strong>${p.side==='long'?'📈多':'📉空'} ${p.symbol}</strong><br>
        <small style="color:#8890b0">入场 ${p.entry} × ${p.qty}${tpInfo}${slInfo}</small>
      </div>
      <div style="text-align:right">
        <span class="pnl ${pnlClass}">${pnl.toFixed(2)} (${pnlPct.toFixed(2)}%)</span><br>
        <button class="btn btn-danger" style="padding:2px 8px;font-size:10px;margin-top:4px" onclick="closePosition(${p.id})">平仓</button>
      </div>
    </div>`;
  }).join('');
}

function showAlert(msg, type) {
  const el=document.getElementById('alert');
  el.textContent=msg;
  el.className='alert show '+type;
  setTimeout(()=>el.className='alert',2000);
}

// ==================== 事件绑定 ====================
document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById('panel-'+t.dataset.tab).classList.add('active');
  if(t.dataset.tab==='chart'){resizeCanvas();drawChart();}
  if(t.dataset.tab==='position') updatePositionPanel();
});

document.querySelectorAll('.symbol-btn').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.symbol-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  currentSymbol=b.dataset.sym;
  updateData();
});

document.querySelectorAll('.tf-btn').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tf-btn').forEach(x=>x.classList.remove('active'));
  b.classList.add('active');
  currentTF=b.dataset.tf;
  updateData();
});

document.querySelectorAll('.ind-btn').forEach(b=>b.onclick=()=>{
  const ind=b.dataset.ind;
  if(activeIndicators.has(ind)) activeIndicators.delete(ind);
  else activeIndicators.add(ind);
  b.classList.toggle('active');
  drawChart();
});

document.getElementById('aiInput').addEventListener('keydown',e=>{if(e.key==='Enter')askAI();});

// ==================== 启动 ====================
resizeCanvas();
updateData();
setInterval(updateData, 30000);
window.addEventListener('resize',()=>{resizeCanvas();drawChart();});
</script>
